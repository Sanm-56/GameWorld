<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin - Torneo</title>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:20px;
overflow-x:hidden;
}

button, select{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
}

button{
background:#3b82f6;
color:white;
}

button:hover{
background:#2563eb;
}

.danger{
background:#dc2626;
}

.danger:hover{
background:#b91c1c;
}

.reset-actions{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:6px;
margin-top:10px;
}

#panelAdmin{
display:none;
}

table{
margin:auto;
border-collapse:collapse;
width:90%;
background:white;
color:black;
border-radius:10px;
overflow:hidden;
}

th, td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#111;
color:white;
}

.sospechoso{background:#fff3cd;}
.invalido{background:#f8d7da;}
.normal{background:#d4edda;}

.section{
margin:15px 0;
padding:10px;
background:#1e293b;
border-radius:10px;
}

.admin-table-wrap{
width:100%;
overflow-x:auto;
-webkit-overflow-scrolling:touch;
}

.admin-table-wrap table{
width:100%;
min-width:560px;
}

@media (max-width:600px){
body{
padding:12px;
}
th, td{
padding:8px;
font-size:14px;
}
}
</style>

</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="loginAdmin">
<h2>🔒 Acceso Admin</h2>
<input type="password" id="clave" placeholder="Contraseña">
<br><br>
<button onclick="entrarAdmin()">Entrar</button>
<br><br>
<button onclick="window.location.href = 'index.html'">🏠 Regresar al Menú</button>
</div>

<!-- ================= PANEL ================= -->
<div id="panelAdmin">

<h1>🎛️ Panel Admin - Torneo</h1>

<button onclick="window.location.href = 'index.html'">🏠 Regresar al Menú</button>

<!-- ESTADO TORNEO -->
<div class="section">
<h3 id="juegoActivo">Juego actual: -</h3>
</div>

<!-- CONTROL TORNEO -->
<div class="section">
<h3>🎮 Control del Torneo</h3>

<select id="juegoSelect">
<option value="sudoku">Sudoku</option>
<option value="memoria">Memoria</option>
<option value="matematicas">Matematicas</option>
<option value="flashmind">FlashMind</option>
<option value="numcatch">NumCatch</option>
<option value="ajedrez">Ajedrez</option>
<option value="domino">Dominó</option>
<option value="damas">Damas</option>
</select>

<div id="numcatchConfig" style="display:none; margin-top:10px;">
  <label style="display:block; margin-bottom:6px; color:#cbd5e1; font-weight:bold;">
    Condición NumCatch
  </label>
  <select id="numcatchCondicion">
    <option value="multiplos_2">Múltiplos de 2</option>
    <option value="multiplos_3" selected>Múltiplos de 3</option>
    <option value="multiplos_5">Múltiplos de 5</option>
    <option value="pares">Pares</option>
    <option value="impares">Impares</option>
  </select>
</div>

<br>

<button onclick="iniciarTorneo()">🚀 Iniciar Torneo</button>
<button onclick="detenerTorneo()">🛑 Detener Torneo</button>

<div class="reset-actions">
<button onclick="borrarRankingSemana()">Borrar ranking semana</button>
<button onclick="borrarRankingVictorias()">Borrar ranking victorias</button>
<button onclick="borrarRankingGlobal()">Borrar ranking global</button>
<button onclick="reiniciarTemporada()">Reiniciar temporada</button>
<button class="danger" onclick="resetTotal()">Resetear torneo completo</button>
</div>
</div>

<!-- CONTROL RANKING -->
<div class="section">
<h3>📊 Ranking</h3>

<h2 id="contador">👥 Jugadores: 0</h2>

<button onclick="cargarRanking()">🔄 Actualizar</button>
<button onclick="verSospechosos()">⚠️ Sospechosos</button>
<button onclick="verInvalidos()">❌ Inválidos</button>
<button onclick="limpiarRanking()">🧹 Limpiar Ranking</button>
</div>

<!-- TABLA -->
<div class="section">
<h3>📋 Tabla de jugadores</h3>

<div class="admin-table-wrap">
<table>
<thead>
<tr>
<th>#</th>
<th>Jugador</th>
<th>Tiempo</th>
<th>Estado</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tablaAdmin"></tbody>
</table>
</div>
</div>

</div>

<script type="module" src="juegos/js/admin.js"></script>

</body>
</html>
