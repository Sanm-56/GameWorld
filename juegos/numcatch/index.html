<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingreso NumCatch</title>
  <style>
    :root{
      --bg-1:#071a12;
      --bg-2:#0b2a1a;
      --card:rgba(15,23,42,0.7);
      --card-border:rgba(34,197,94,0.22);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --accent:#22c55e;
      --accent-2:#16a34a;
      --input:#071a12;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:24px;
      font-family:Verdana, Geneva, Tahoma, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(34,197,94,0.16), transparent 30%),
        radial-gradient(circle at bottom right, rgba(59,130,246,0.1), transparent 28%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
    }
    .container{
      width:min(100%, 430px);
      background:var(--card);
      border:1px solid var(--card-border);
      border-radius:28px;
      padding:34px 28px;
      text-align:center;
      box-shadow:0 24px 60px rgba(0,0,0,0.42);
      backdrop-filter:blur(10px);
    }
    .icono{ font-size:48px; margin-bottom:10px; }
    h2{ margin:0 0 10px; font-size:34px; letter-spacing:0.6px; }
    p{ margin:0 0 18px; color:var(--muted); line-height:1.55; }
    input{
      width:100%;
      padding:14px 14px;
      margin:9px 0;
      border:none;
      border-radius:14px;
      background:var(--input);
      color:var(--text);
      outline:1px solid rgba(148,163,184,0.16);
      font-size:16px;
    }
    input:focus{ outline:2px solid rgba(34,197,94,0.45); }
    button{
      width:100%;
      margin-top:14px;
      padding:14px 16px;
      border:none;
      border-radius:16px;
      cursor:pointer;
      font-size:18px;
      font-weight:bold;
      color:white;
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow:0 14px 24px rgba(34,197,94,0.22);
      transition:transform 0.2s ease, box-shadow 0.2s ease;
    }
    button:hover{
      transform:translateY(-2px);
      box-shadow:0 18px 30px rgba(34,197,94,0.28);
    }
    .acciones-login{
      display:grid;
      gap:10px;
    }
    .volver{
      background:rgba(15,23,42,0.72);
      border:1px solid rgba(148,163,184,0.24);
      box-shadow:none;
    }
    .volver:hover{
      box-shadow:0 14px 24px rgba(15,23,42,0.28);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icono">🔢</div>
    <h2>NumCatch</h2>
    <p>Ingresa con tu apodo y tu código único para entrar al lobby del torneo.</p>
    <input id="usuario" placeholder="Tu apodo" />
    <input id="codigo" placeholder="Código único" />
    <div class="acciones-login">
      <button onclick="entrar()">Entrar</button>
      <button class="volver" onclick="window.location.href='../../index.html'">Volver al menú principal</button>
    </div>
  </div>
  <script type="module" src="../js/login.js"></script>
</body>
</html>
