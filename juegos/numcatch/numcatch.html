<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NumCatch</title>
  <style>
    :root{
      --bg:#071a12;
      --panel:#0b2a1ae6;
      --border:rgba(148,163,184,0.16);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --ok:#22c55e;
      --bad:#ef4444;
      --accent:#22c55e;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      min-height:100dvh;
      font-family:Verdana, Geneva, Tahoma, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(34,197,94,0.16), transparent 30%),
        radial-gradient(circle at bottom right, rgba(59,130,246,0.1), transparent 28%),
        linear-gradient(145deg, #071a12, #0b2a1a);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:18px;
    }
    .contenedor{
      width:min(980px, 100%);
      background:rgba(15,23,42,0.62);
      border:1px solid rgba(34,197,94,0.18);
      border-radius:26px;
      padding:22px;
      box-shadow:0 24px 70px rgba(0,0,0,0.42);
      backdrop-filter:blur(10px);
    }
    .top{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      margin-bottom:16px;
    }
    .pill{
      display:inline-flex;
      gap:10px;
      align-items:center;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,0.16);
      background:rgba(2,6,23,0.22);
      color:var(--muted);
      font-weight:bold;
      font-size:14px;
    }
    h1{ margin:0 0 6px; font-size:28px; letter-spacing:0.4px; }
    .sub{ margin:0 0 10px; color:var(--muted); line-height:1.5; }
    .zona{
      display:grid;
      grid-template-columns:1fr 320px;
      gap:16px;
      align-items:stretch;
    }
    @media (max-width: 860px){
      .zona{ grid-template-columns:1fr; }
    }
    .game{
      border:1px solid rgba(148,163,184,0.16);
      border-radius:22px;
      background:rgba(2,6,23,0.22);
      padding:18px;
      min-height:420px;
      position:relative;
      overflow:hidden;
    }
    .condicion{
      position:absolute;
      top:12px;
      left:12px;
      right:12px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
      z-index:2;
    }
    .condicion .tag{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,0.16);
      background:rgba(15,23,42,0.6);
      font-weight:bold;
      color:var(--muted);
      font-size:13px;
    }
    .numero{
      position:absolute;
      top:-60px;
      width:54px;
      height:54px;
      border-radius:18px;
      display:flex;
      justify-content:center;
      align-items:center;
      font-weight:bold;
      font-size:22px;
      cursor:pointer;
      user-select:none;
      border:1px solid rgba(255,255,255,0.12);
      box-shadow:0 14px 26px rgba(0,0,0,0.28);
      z-index:1;
    }
    .panel{
      border:1px solid rgba(148,163,184,0.16);
      border-radius:22px;
      background:rgba(2,6,23,0.18);
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .badge{
      padding:10px 12px;
      border-radius:16px;
      border:1px solid rgba(148,163,184,0.16);
      background:rgba(15,23,42,0.55);
      color:var(--muted);
      font-weight:bold;
      font-size:13px;
    }
    .badge strong{ color:var(--text); }
    .log{
      border:1px solid rgba(148,163,184,0.16);
      background:rgba(15,23,42,0.6);
      border-radius:18px;
      padding:12px;
      color:var(--muted);
      font-size:13px;
      line-height:1.35;
      min-height:88px;
    }
/* 🔥 BOTONES PRO */
.btn{
padding:12px 20px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:all 0.2s ease;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}  
/* MORADO PARA MÚSICA */
.btn.musica{
background:linear-gradient(135deg, #8b5cf6, #7c3aed);
color:white;
}

/* POSICIÓN MÚSICA */
.musica-pos{
position:absolute;
bottom:20px;
left:20px;
}

/* EFECTO */
.btn:hover{
transform:translateY(-2px) scale(1.05);
box-shadow:0 15px 15px rgba(0,0,0,0.4);
}
  </style>
</head>
<body>
  <div class="contenedor">
    <div class="top">
      <div>
        <h1>🔢 NumCatch</h1>
        <p class="sub">Caen números y debes tocar solo los que cumplan la condición.</p>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <div class="pill">⏱️ <span id="reloj">-</span></div>
        <div class="pill">👤 <span id="usuarioLabel">-</span></div>
      </div>
    </div>

    <div class="zona">
      <div class="game" id="game">
        <div class="condicion">
          <div class="tag" id="condicion">Condición: -</div>
          <div class="tag">Tip: si te equivocas, pierdes puntos</div>
        </div>
      </div>
      <div class="panel">
        <div class="badge">✅ Aciertos: <strong id="aciertos">0</strong></div>
        <div class="badge">❌ Errores: <strong id="errores">0</strong></div>
        <div class="badge">⭐ Puntaje: <strong id="puntaje">0</strong></div>
        <div class="badge">⚡ Velocidad: <strong id="velocidad">1</strong></div>
        <div class="log" id="log">Listo. Toca solo los números correctos…</div>
      </div>
    </div>
  </div>
<!-- BOTÓN DE MÚSICA EN INFERIOR IZQUIERDA -->
  <button class="btn musica musica-pos" onclick="reproducirMusica()">🎵 Música</button>

  <audio loop>
    <source src="./musicc/numcatch.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
  </div>
  <script type="module" src="./js/numcatch.js"></script>

  <script>
/* FUNCIÓN PARA REPRODUCIR/PAUSAR MÚSICA */
function reproducirMusica(){
  const audio = document.querySelector('audio');
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}
</script>
</body>
</html>
