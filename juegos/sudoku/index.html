<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingreso Sudoku</title>

<style>
:root{
  --bg-1:#071426;
  --bg-2:#0f2b46;
  --card:rgba(12, 30, 56, 0.82);
  --card-border:rgba(96,165,250,0.32);
  --text:#eff6ff;
  --muted:#bfdbfe;
  --accent:#38bdf8;
  --accent-2:#22c55e;
  --input:#0b1120;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:24px;
  font-family:Verdana, Geneva, Tahoma, sans-serif;
  color:var(--text);
  background:
    linear-gradient(90deg, rgba(96,165,250,0.08) 1px, transparent 1px),
    linear-gradient(0deg, rgba(96,165,250,0.08) 1px, transparent 1px),
    radial-gradient(circle at top, rgba(96,165,250,0.2), transparent 30%),
    radial-gradient(circle at bottom right, rgba(34,197,94,0.18), transparent 28%),
    linear-gradient(145deg, var(--bg-1), var(--bg-2));
  background-size:34px 34px, 34px 34px, auto, auto, auto;
}

.container{
  width:min(100%, 430px);
  background:var(--card);
  border:1px solid var(--card-border);
  border-radius:28px;
  padding:34px 28px;
  text-align:center;
  box-shadow:0 24px 60px rgba(0,0,0,0.42);
  backdrop-filter:blur(10px);
}

.icono{
  font-size:48px;
  margin-bottom:10px;
}

h2{
  margin:0 0 8px;
  font-size:34px;
}

p{
  margin:0 0 24px;
  color:var(--muted);
  line-height:1.5;
}

input{
  width:100%;
  display:block;
  margin:0 0 14px;
  padding:14px 16px;
  border-radius:14px;
  border:1px solid #93c5fd55;
  background:var(--input);
  color:var(--text);
  font-size:16px;
  outline:none;
}

input::placeholder{
  color:#93c5fd;
}

input:focus{
  border-color:#60a5fa;
  box-shadow:0 0 0 4px rgba(96,165,250,0.18);
}

button{
  width:100%;
  margin-top:6px;
  padding:14px 20px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg, var(--accent), var(--accent-2));
  color:white;
  font-size:17px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 14px 24px rgba(22,163,74,0.28);
  transition:transform 0.2s ease, box-shadow 0.2s ease;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 18px 30px rgba(22,163,74,0.35);
}

.acciones-login{
  display:grid;
  gap:10px;
}

.volver{
  background:rgba(15,23,42,0.72);
  border:1px solid rgba(148,163,184,0.24);
  box-shadow:none;
}

.volver:hover{
  box-shadow:0 14px 24px rgba(15,23,42,0.28);
}

@media (max-width:480px){
  body{
    padding:16px;
    align-items:flex-start;
  }

  .container{
    margin-top:18px;
    padding:28px 20px;
    border-radius:24px;
  }

  h2{
    font-size:30px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="icono">S9</div>
  <h2>🧩 Sudoku</h2>
  <p>Ingresa con tu apodo y tu código único para entrar al lobby del torneo.</p>
  <input id="usuario" placeholder="Tu apodo">
  <input id="codigo" placeholder="Código unico">

  <div class="acciones-login">
    <button onclick="entrar()">Entrar</button>
    <button class="volver" onclick="window.location.href='../../index.html'">Volver al menu principal</button>
  </div>
</div>

<script type="module" src="../js/login.js"></script>

</body>
</html>
