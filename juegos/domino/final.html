<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultado Dominó</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

.contenedor{
  max-width:800px;
  margin:0 auto;
  padding:40px 20px;
  text-align:center;
}

h1{
  font-size:2.5em;
  margin-bottom:30px;
}

#resultadoFinal{
  font-size:1.5em;
  padding:20px;
  background:#1e293b;
  border-radius:12px;
  margin-bottom:30px;
  min-height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
}

h2{
  color:#22c55e;
  margin:20px 0;
}

#podio{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:30px 0;
  flex-wrap:wrap;
}

#podio div{
  background:linear-gradient(135deg, #1e293b, #0f172a);
  padding:20px;
  border-radius:12px;
  border:2px solid #22c55e;
  min-width:150px;
}

#podio h3{
  margin:0 0 10px 0;
  font-size:1.2em;
}

#podio p{
  margin:0;
  color:#94a3b8;
}

#ranking{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  max-height:300px;
  overflow-y:auto;
  margin:20px 0;
}

#ranking div{
  padding:8px;
  border-bottom:1px solid #333;
}

#ranking div:last-child{
  border-bottom:none;
}

.btn{
  padding:15px 30px;
  background:linear-gradient(135deg, #22c55e, #16a34a);
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:all 0.2s ease;
}

.btn:hover{
  transform:translateY(-2px) scale(1.05);
}
/* MORADO PARA MÚSICA */
.btn.musica{
background:linear-gradient(135deg, #8b5cf6, #7c3aed);
color:white;
width:auto;
}

/* POSICIÓN MÚSICA */
.musica-pos{
position:absolute;
bottom:20px;
left:20px;
}

/* EFECTO */
.btn:hover{
transform:translateY(-2px) scale(1.05);
box-shadow:0 6px 15px rgba(0,0,0,0.4);
}

@media (max-width:500px){
  .contenedor{
    padding:24px 14px;
  }

  h1{
    font-size:1.75em;
  }

  #resultadoFinal{
    font-size:1.15em;
  }
}
</style>
<style>
html, body{width:100%;max-width:100%;overflow-x:hidden;}
body{box-sizing:border-box;}
.contenedor,#podio,#ranking{max-width:100%;min-width:0;box-sizing:border-box;}
#podio div,#ranking div,h1,h2,p,button{overflow-wrap:anywhere;}
.musica-pos{position:fixed;bottom:14px;left:14px;z-index:1000;}
@media (max-width:500px){
body{padding-bottom:74px;}
#podio div{min-width:0;width:100%;}
.btn{max-width:100%;font-size:15px;}
.btn.musica{width:auto;max-width:calc(100vw - 28px);}
}
</style>
<style>
body{
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 30%),
    linear-gradient(135deg, #111827, #030712);
}
.contenedor{
  border-radius:24px;
  background:#0b0f19;
  border:1px solid rgba(255,255,255,0.18);
  box-shadow:0 28px 70px rgba(0,0,0,0.44);
}
h1{
  color:#f8fafc;
}
#resultadoFinal{
  background:#f8fafc;
  color:#111827;
  border:4px solid #111827;
  box-shadow:inset 0 0 0 2px #d1d5db;
}
#podio div{
  background:#f8fafc;
  color:#111827;
  border:4px solid #111827;
  border-radius:16px;
  box-shadow:0 16px 30px rgba(0,0,0,0.28);
}
#ranking{
  background:#030712;
  border:1px solid rgba(255,255,255,0.16);
}
button.btn:not(.musica){
  background:linear-gradient(135deg, #f8fafc, #cbd5e1);
  color:#111827;
}
</style>
<style>
.contenedor{
  width:min(760px, 100%);
  margin:0 auto;
}
.contenedor > h1,
.contenedor > h2,
.contenedor > h3,
.contenedor > #resultadoFinal,
.contenedor > #resumenFinal,
.contenedor > .posicion-final{
  width:min(580px, 100%);
  margin-left:auto;
  margin-right:auto;
  text-align:center;
  line-height:1.35;
}
#ranking{
  width:min(580px, 100%);
  margin:16px auto 0;
  max-height:min(380px, 48vh);
}
#ranking .ranking-row{
  display:grid;
  grid-template-columns:52px minmax(0, 1fr) auto;
  gap:12px;
  align-items:center;
  padding:12px 10px;
}
#ranking .ranking-row.actual{
  border-radius:12px;
  background:rgba(248,250,252,0.12);
}
#ranking .ranking-row span:last-child{
  justify-self:end;
  text-align:right;
  white-space:nowrap;
}
#ranking p,
#ranking .vacio{
  margin:0;
  padding:28px 14px;
  text-align:center;
}
.contenedor > button:not(.musica),
.contenedor > .btn:not(.musica){
  display:block;
  width:min(340px, 100%);
  margin-left:auto;
  margin-right:auto;
}
@media (max-width:560px){
  #ranking .ranking-row{grid-template-columns:42px minmax(0, 1fr);}
  #ranking .ranking-row span:last-child{grid-column:2;justify-self:start;text-align:left;}
}
</style>
<link rel="stylesheet" href="../css/finales.css">
<style>
body{
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 30%),
    linear-gradient(135deg, #111827, #030712) !important;
}
.contenedor{
  background:linear-gradient(180deg, #0b0f19, #030712) !important;
  border-color:rgba(255,255,255,0.18) !important;
  box-shadow:0 28px 80px rgba(0,0,0,0.5) !important;
}
h1{
  color:#f8fafc !important;
}
#resultadoFinal{
  color:#111827 !important;
  background:#f8fafc !important;
  border:4px solid #111827 !important;
  box-shadow:inset 0 0 0 2px #d1d5db !important;
}
.contenedor > button:not(.musica),
.contenedor > .btn:not(.musica){
  background:linear-gradient(135deg, #f8fafc, #cbd5e1) !important;
  color:#111827 !important;
}
</style>
</head>

<body>
<div class="contenedor">
<h1>Resultado Domino</h1>

<div id="resultadoFinal">Cargando...</div>

<div id="podio"></div>

<h2>Ranking</h2>
<div id="ranking">Cargando resultados...</div>

<button class="btn" onclick="volverLobby()">Volver al Lobby</button>
</div>

<!-- BOTÓN DE MÚSICA EN INFERIOR IZQUIERDA -->
<button class="btn musica musica-pos" onclick="reproducirMusica()">Musica</button>

<audio loop>
  <source src="./music/dominomusic.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<script type="module" src="./js/final.js"></script>
<script>
/* FUNCIÓN PARA REPRODUCIR/PAUSAR MÚSICA */
function reproducirMusica(){
  const audio = document.querySelector('audio');
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}
</script>
</body>
</html>
