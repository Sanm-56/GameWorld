<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultado Dominó</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

.contenedor{
  max-width:800px;
  margin:0 auto;
  padding:40px 20px;
  text-align:center;
}

h1{
  font-size:2.5em;
  margin-bottom:30px;
}

#resultadoFinal{
  font-size:1.5em;
  padding:20px;
  background:#1e293b;
  border-radius:12px;
  margin-bottom:30px;
  min-height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
}

h2{
  color:#22c55e;
  margin:20px 0;
}

#podio{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:30px 0;
  flex-wrap:wrap;
}

#podio div{
  background:linear-gradient(135deg, #1e293b, #0f172a);
  padding:20px;
  border-radius:12px;
  border:2px solid #22c55e;
  min-width:150px;
}

#podio h3{
  margin:0 0 10px 0;
  font-size:1.2em;
}

#podio p{
  margin:0;
  color:#94a3b8;
}

#ranking{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  max-height:300px;
  overflow-y:auto;
  margin:20px 0;
}

#ranking div{
  padding:8px;
  border-bottom:1px solid #333;
}

#ranking div:last-child{
  border-bottom:none;
}

.btn{
  padding:15px 30px;
  background:linear-gradient(135deg, #22c55e, #16a34a);
  color:white;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:all 0.2s ease;
}

.btn:hover{
  transform:translateY(-2px) scale(1.05);
}
/* MORADO PARA MÚSICA */
.btn.musica{
background:linear-gradient(135deg, #8b5cf6, #7c3aed);
color:white;
width:auto;
}

/* POSICIÓN MÚSICA */
.musica-pos{
position:absolute;
bottom:20px;
left:20px;
}

/* EFECTO */
.btn:hover{
transform:translateY(-2px) scale(1.05);
box-shadow:0 6px 15px rgba(0,0,0,0.4);
}

@media (max-width:500px){
  .contenedor{
    padding:24px 14px;
  }

  h1{
    font-size:1.75em;
  }

  #resultadoFinal{
    font-size:1.15em;
  }
}
</style>
</head>

<body>
<div class="contenedor">
<h1>🎲 Resultado Dominó</h1>

<div id="resultadoFinal">Cargando...</div>

<div id="podio"></div>

<h2>📊 Ranking</h2>
<div id="ranking">Cargando resultados...</div>

<button class="btn" onclick="volverLobby()">🔙 Volver al Lobby</button>
</div>

<!-- BOTÓN DE MÚSICA EN INFERIOR IZQUIERDA -->
<button class="btn musica musica-pos" onclick="reproducirMusica()">🎵 Música</button>

<audio loop>
  <source src="./music/dominomusic.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<script type="module" src="./js/final.js"></script>
<script>
/* FUNCIÓN PARA REPRODUCIR/PAUSAR MÚSICA */
function reproducirMusica(){
  const audio = document.querySelector('audio');
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}
</script>
</body>
</html>
