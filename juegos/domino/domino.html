<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominó</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

.contenedor{
  max-width:980px;
  margin:0 auto;
  padding:20px;
  text-align:center;
}

h1{
  margin:0;
}

.game-container{
  display:flex;
  gap:30px;
  justify-content:center;
  flex-wrap:wrap;
  margin:20px 0;
}

.players{
  flex:1;
  min-width:250px;
}

.player{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  border-left:4px solid #22c55e;
}

.player.opponent{
  border-left-color:#e74c3c;
}

.player h3{
  margin:0 0 10px 0;
  font-size:1.1em;
}

.player-stats{
  display:flex;
  justify-content:space-around;
  font-size:0.9em;
  color:#94a3b8;
}

#table{
  flex:1;
  min-width:300px;
  background:#0a0e27;
  border:2px dashed #22c55e;
  border-radius:12px;
  padding:20px;
  min-height:200px;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.domino{
  background:#333;
  border:2px solid #666;
  border-radius:4px;
  width:60px;
  height:100px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#22c55e;
  font-weight:bold;
  font-size:1.5em;
  cursor:pointer;
  transition:all 0.2s ease;
}

button.domino{
  appearance:none;
}

.domino:hover{
  border-color:#22c55e;
  box-shadow:0 0 10px #22c55e;
}

#hand{
  background:#1e293b;
  border-radius:12px;
  padding:20px;
  margin:20px 0;
  min-height:120px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  align-items:center;
}

.game-info{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
  margin:20px 0;
}

.status,
.result{
  padding:12px 16px;
  border-radius:12px;
  background:#1e293b;
  min-width:180px;
}

.control{
  margin-top:20px;
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}

.btn{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:all 0.2s ease;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  background:linear-gradient(135deg, #22c55e, #16a34a);
  color:white;
}

.btn:hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 6px 15px rgba(0,0,0,0.4);
}

.btn:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

.btn.musica{
  background:linear-gradient(135deg, #8b5cf6, #7c3aed);
  width:auto;
}

.musica-pos{
  position:fixed;
  bottom:20px;
  left:20px;
  z-index:1000;
}

@media (max-width:768px){
  .game-container{
    flex-direction:column;
  }

  #hand{
    max-height:200px;
    overflow-y:auto;
  }
}
</style>
</head>

<body>
<div class="contenedor">
<h1>Dominó del Torneo</h1>

<div class="game-container">
  <div class="players">
    <div class="player">
      <h3>Tu</h3>
      <div class="player-stats">
        <span>Fichas: <strong id="myPieces">21</strong></span>
        <span>Puntos: <strong id="myScore">0</strong></span>
      </div>
    </div>

    <div class="player opponent">
      <h3>Bot</h3>
      <div class="player-stats">
        <span>Fichas: <strong id="botPieces">21</strong></span>
        <span>Puntos: <strong id="botScore">0</strong></span>
      </div>
    </div>
  </div>

  <div id="table">
    <p style="color:#666;">Mesa vacia - Coloca una ficha para empezar</p>
  </div>
</div>

<div id="hand">
  <p style="color:#666;">Cargando fichas...</p>
</div>

<div class="game-info">
  <div class="status" id="status">Tu turno</div>
</div>

<div class="control">
  <button class="btn" id="passBtn" onclick="passTurn()" style="display:none;">Pasar turno</button>
  <button class="btn" onclick="resign()">Rendirse</button>
</div>

<div class="result" id="result" style="display:none;margin-top:20px;"></div>
</div>

<button class="btn musica musica-pos" onclick="reproducirMusica()">Musica</button>
<audio loop>
  <source src="./music/musicadomino.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<script type="module" src="./js/domino.js"></script>
</body>
</html>
