<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memoria</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#0f172a;
color:white;
margin:0;
overflow-x:hidden;
}

#tablero{
display:grid;
grid-template-columns:repeat(6,80px);
gap:10px;
justify-content:center;
margin-top:20px;
}

/* 🃏 CARTA CONTENEDOR */
.carta{
width:80px;
height:80px;
perspective:800px;
cursor:pointer;
position:relative;
}

/* 🔄 CONTENIDO QUE GIRA */
.carta-inner{
width:100%;
height:100%;
position:absolute;
transform-style:preserve-3d;
transition: transform 0.5s;
}

/* 🃏 VOLTEO */
.carta.volteada .carta-inner{
transform: rotateY(180deg);
}

/* CARAS */
.cara{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
border-radius:10px;
backface-visibility:hidden;
}

/* FRENTE */
.frente{
background:#1e293b;
}

/* ATRÁS */
.atras{
background:white;
color:black;
transform: rotateY(180deg);
}

/* ✨ ACIERTO */
.acierto{
animation: aciertoAnim 0.4s;
}

@keyframes aciertoAnim{
0%{ transform: scale(1); }
50%{ transform: scale(1.2); background: lightgreen; }
100%{ transform: scale(1); }
}

/* 💥 ERROR */
.error{
animation: errorAnim 0.4s;
}

@keyframes errorAnim{
0%{ transform: translateX(0); }
25%{ transform: translateX(-6px); }
50%{ transform: translateX(6px); }
75%{ transform: translateX(-6px); }
100%{ transform: translateX(0); }
}

/* 🔥 BOTONES PRO */
.btn{
padding:12px 20px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:all 0.2s ease;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* MORADO PARA MÚSICA */
.btn.musica{
background:linear-gradient(135deg, #8b5cf6, #7c3aed);
color:white;
width:auto;
}

/* POSICIÓN MÚSICA */
.musica-pos{
position:absolute;
bottom:20px;
left:20px;
}

/* EFECTO */
.btn:hover{
transform:translateY(-2px) scale(1.05);
box-shadow:0 6px 15px rgba(0,0,0,0.4);
}

/* 📱 RESPONSIVE (mismo enfoque que sudoku/matemáticas: solo pantallas estrechas) */
@media (max-width:520px){
#tablero{
grid-template-columns:repeat(6, 1fr);
width:100%;
max-width:min(520px, calc(100vw - 20px));
margin-left:auto;
margin-right:auto;
gap:6px;
padding:0 10px;
box-sizing:border-box;
}

.carta{
width:100%;
height:auto;
aspect-ratio:1;
}

.cara{
font-size:clamp(16px, 5vw, 30px);
}
}

</style>
<style>
html{
width:100%;
max-width:100%;
overflow-x:hidden;
}

body{
width:100%;
max-width:100%;
padding:14px 10px 74px;
box-sizing:border-box;
}

#tablero{
max-width:100%;
min-width:0;
}

.musica-pos{
position:fixed;
bottom:14px;
left:14px;
z-index:1000;
}

@media (max-width:520px){
h1{
font-size:1.5rem;
overflow-wrap:anywhere;
}

#tablero{
max-width:100%;
padding:0;
}

.btn.musica{
max-width:calc(100vw - 28px);
}
}
</style>
<link rel="stylesheet" href="../css/responsive-desktop.css">
</head>

<body>

<h1>🧠 Juego de Memoria</h1>
<h2 id="reloj">10:00</h2>
<h2 id="racha">🙂</h2>

<div id="tablero"></div>

<!-- BOTÓN DE MÚSICA EN INFERIOR IZQUIERDA -->
<button class="btn musica musica-pos" onclick="reproducirMusica()">🎵 Música</button>

<audio loop>
  <source src="./music/musicamemoria.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<script type="module" src="./js/memoria.js"></script>

<script>
/* FUNCIÓN PARA REPRODUCIR/PAUSAR MÚSICA */
function reproducirMusica(){
  const audio = document.querySelector('audio');
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}
</script>

</body>
</html>
