<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados del Torneo</title>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:20px;
overflow-x:hidden;
}

h1{
margin-bottom:10px;
}

#podio{
margin:20px 0;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

#podio div{
background:#1e293b;
padding:15px;
border-radius:10px;
width:150px;
}

#ranking{
margin-top:20px;
background:#1e293b;
padding:15px;
border-radius:10px;
max-width:400px;
margin-left:auto;
margin-right:auto;
}

#ranking div{
padding:5px;
border-bottom:1px solid #334155;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

/* 🔥 BOTONES PRO */
.btn{
padding:12px 20px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:all 0.2s ease;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* MORADO PARA MÚSICA */
.btn.musica{
background:linear-gradient(135deg, #8b5cf6, #7c3aed);
color:white;
width:auto;
}

/* POSICIÓN MÚSICA */
.musica-pos{
position:absolute;
bottom:20px;
left:20px;
}

/* EFECTO */
.btn:hover{
transform:translateY(-2px) scale(1.05);
box-shadow:0 6px 15px rgba(0,0,0,0.4);
}

@media (max-width:500px){
body{
padding:12px;
}
#podio div{
width:100%;
max-width:160px;
}
}

</style>
<style>
html, body{width:100%;max-width:100%;overflow-x:hidden;}
body{padding:14px;box-sizing:border-box;}
#podio,#ranking{max-width:100%;min-width:0;box-sizing:border-box;}
#podio div,#ranking div,h1,h2,button{overflow-wrap:anywhere;}
.musica-pos{position:fixed;bottom:14px;left:14px;z-index:1000;}
@media (max-width:500px){
body{align-items:flex-start;padding-bottom:74px;}
#podio{max-width:100%;}
button{max-width:100%;font-size:15px;}
.btn.musica{width:auto;max-width:calc(100vw - 28px);}
}
</style>
<link rel="stylesheet" href="../css/finales.css">
<style>
body{
  min-height:100vh;
  background:
    radial-gradient(circle at 20% 18%, rgba(236,72,153,0.25), transparent 28%),
    radial-gradient(circle at 80% 10%, rgba(56,189,248,0.2), transparent 24%),
    #160f2f;
  color:#f8fafc;
}
body > h1,
body > h2,
body > #podio,
body > #ranking,
body > button:not(.musica){
  width:min(760px, 100%);
}
.contenedor{
  width:min(980px, 100%);
  margin:0 auto;
  padding:28px;
  border-radius:24px;
  background:rgba(15,23,42,0.64);
  border:1px solid rgba(244,114,182,0.24);
  box-shadow:0 28px 70px rgba(0,0,0,0.34);
}
h1{
  margin:10px auto 18px;
  font-size:clamp(2rem, 7vw, 3.2rem);
}
h2{
  color:#f9a8d4;
}
#podio{
  display:grid;
  gap:14px;
}
#podio div{
  width:auto;
  min-height:130px;
  display:grid;
  place-items:center;
  background:linear-gradient(145deg, #312e81, #831843);
  border:1px solid rgba(244,114,182,0.36);
  border-radius:18px;
  box-shadow:0 20px 40px rgba(0,0,0,0.28);
}
#ranking{
  max-width:100%;
  border-radius:18px;
  background:rgba(15,23,42,0.72);
  border:1px solid rgba(244,114,182,0.28);
}
#ranking div{
  padding:10px 12px;
}
button:not(.musica){
  background:linear-gradient(135deg, #ec4899, #8b5cf6);
}
#panelResumen{
  display:grid;
  grid-template-columns:1.05fr 1fr;
  gap:18px;
  align-items:start;
}
@media (max-width:640px){
  .contenedor{padding:20px 14px;}
  #panelResumen{grid-template-columns:1fr;}
}
</style>
<style>
.contenedor > h1,
.contenedor > h2,
.contenedor > h3,
.contenedor > #resultadoFinal,
.contenedor > #resumenFinal,
.contenedor > .posicion-final{
  width:min(620px, 100%);
  margin-left:auto;
  margin-right:auto;
  text-align:center;
  line-height:1.35;
}
#ranking{
  width:100%;
  margin:0 auto;
  max-height:min(380px, 48vh);
}
#ranking .ranking-row{
  display:grid;
  grid-template-columns:52px minmax(0, 1fr) auto;
  gap:12px;
  align-items:center;
  padding:12px 10px;
}
#ranking .ranking-row.actual{
  border-radius:12px;
  background:rgba(236,72,153,0.16);
}
#ranking .ranking-row span:last-child{
  justify-self:end;
  text-align:right;
  white-space:nowrap;
}
#ranking p,
#ranking .vacio{
  margin:0;
  padding:28px 14px;
  text-align:center;
}
.contenedor > button:not(.musica){
  display:block;
  width:min(340px, 100%);
  margin-left:auto;
  margin-right:auto;
}
@media (max-width:560px){
  #ranking .ranking-row{grid-template-columns:42px minmax(0, 1fr);}
  #ranking .ranking-row span:last-child{grid-column:2;justify-self:start;text-align:left;}
}
</style>
</head>

<body>

<div class="contenedor">

<h1>Resultados del Torneo</h1>

<!-- 🧠 POSICIÓN se inserta con JS -->

<!-- 🥇 PODIO -->
<section id="panelResumen">
<div id="podio"></div>

<!-- 📊 RANKING -->
<div id="ranking"></div>
</section>

<button onclick="volverLobby()">Volver al lobby</button>

</div>

<!-- BOTÓN DE MÚSICA EN INFERIOR IZQUIERDA -->
<button class="btn musica musica-pos" onclick="reproducirMusica()">Musica</button>

<audio loop>
  <source src="./music/musicamemoria.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<script>
/* FUNCIÓN PARA REPRODUCIR/PAUSAR MÚSICA */
function reproducirMusica(){
  const audio = document.querySelector('audio');
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}
</script>

<script type="module" src="./js/final.js"></script>

</body>
</html>
