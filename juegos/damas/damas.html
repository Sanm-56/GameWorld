<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damas</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

.contenedor{
  max-width:980px;
  margin:0 auto;
  padding:20px;
  text-align:center;
}

h1{
  margin:0;
}

#board{
  width:480px;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  gap:0;
  background:#111827;
  border:3px solid #64748b;
  border-radius:12px;
  overflow:hidden;
}

.square{
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border:none;
  padding:0;
}

.square.light{
  background:#e2e8f0;
}

.square.dark{
  background:#475569;
}

.square.selected-square{
  outline:3px solid #facc15;
  outline-offset:-3px;
}

.square.move-target{
  box-shadow:inset 0 0 0 4px #22c55e;
}

.square.capture-target{
  box-shadow:inset 0 0 0 4px #ef4444;
}

.piece{
  width:46px;
  height:46px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  font-weight:bold;
  border:2px solid;
}

.piece.red{
  background:#ef4444;
  color:white;
  border-color:#b91c1c;
}

.piece.blue{
  background:#3b82f6;
  color:white;
  border-color:#1d4ed8;
}

.piece.king{
  box-shadow:0 0 0 3px #facc15 inset;
}

.game-info{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
  margin-top:10px;
}

.status,
.result,
.history{
  padding:12px 16px;
  border-radius:12px;
  background:#1e293b;
  min-width:180px;
}

.control{
  margin-top:20px;
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}

.btn{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:all 0.2s ease;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  background:linear-gradient(135deg, #22c55e, #16a34a);
  color:white;
}

.btn.musica{
  background:linear-gradient(135deg, #8b5cf6, #7c3aed);
}

.musica-pos{
  position:fixed;
  bottom:20px;
  left:20px;
  z-index:1000;
}

@media (max-width:520px){
  #board{
    width:min(320px, calc(100vw - 24px));
    aspect-ratio:1;
  }

  .square{
    width:100%;
    height:auto;
    aspect-ratio:1;
    min-width:0;
    min-height:0;
  }

  .piece{
    width:min(30px, 78%);
    height:min(30px, 78%);
    font-size:17px;
  }
}
</style>
</head>

<body>
<div class="contenedor">
<h1>Damas del Torneo</h1>

<div id="board"></div>

<div class="game-info">
  <div class="status" id="status">Tu turno</div>
  <div class="history" id="history">Rojas: 12 | Azules: 12</div>
</div>

<div class="control">
  <button class="btn" onclick="resign()">Rendirse</button>
</div>

<div class="result" id="result" style="display:none;margin-top:20px;"></div>
</div>

<button class="btn musica musica-pos" onclick="reproducirMusica()">Musica</button>
<audio loop>
  <source src="./music/musicadamas.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<script type="module" src="./js/damas.js"></script>
</body>
</html>
