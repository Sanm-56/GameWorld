<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajedrez</title>
<link rel="stylesheet" href="vendor/chessboard.css">
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

.contenedor{
  max-width:980px;
  margin:0 auto;
  padding:20px;
  text-align:center;
}

h1{
  margin:0;
}

#board{
  width:480px;
  margin:20px auto;
}

.game-info{
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
  margin-top:10px;
}

.status,
.result,
.history{
  padding:12px 16px;
  border-radius:12px;
  background:#1e293b;
  min-width:180px;
}

.control{
  margin-top:20px;
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}

.btn{
  padding:12px 20px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:all 0.2s ease;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  background:linear-gradient(135deg, #22c55e, #16a34a);
  color:white;
}

.btn:hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 6px 15px rgba(0,0,0,0.4);
}

.btn.musica{
  background:linear-gradient(135deg, #8b5cf6, #7c3aed);
  width:auto;
}

.musica-pos{
  position:fixed;
  bottom:20px;
  left:20px;
  z-index:1000;
}

.promotion-modal{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,0.78);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1200;
}

.promotion-modal.visible{
  display:flex;
}

.promotion-card{
  background:#111827;
  border:1px solid #334155;
  border-radius:18px;
  padding:24px;
  width:min(92vw, 420px);
  box-shadow:0 18px 50px rgba(0,0,0,0.45);
}

.promotion-card h2{
  margin:0 0 10px;
  font-size:1.3rem;
}

.promotion-card p{
  margin:0 0 18px;
  color:#94a3b8;
}

.promotion-options{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:12px;
}

.promotion-option{
  border:none;
  border-radius:14px;
  background:#1e293b;
  color:white;
  padding:14px 10px;
  cursor:pointer;
  font-size:1rem;
  font-weight:bold;
  transition:transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
}

.promotion-option:hover{
  transform:translateY(-2px);
  background:#334155;
  box-shadow:0 10px 24px rgba(0,0,0,0.3);
}

.promotion-option span{
  display:block;
}

.promotion-symbol{
  font-size:2rem;
  margin-bottom:8px;
}

@media (max-width:520px){
  #board{
    width:100%;
    max-width:320px;
  }
}
</style>
</head>

<body>
<div class="contenedor">
<h1>Ajedrez del Torneo</h1>

<div id="board"></div>

<div class="game-info">
  <div class="status" id="status">Turno de blancas</div>
  <div class="history" id="history">Movimientos:</div>
</div>

<div class="control">
  <button class="btn" onclick="resetGame()">Reset</button>
  <button class="btn" onclick="resign()">Rendirse</button>
</div>

<div class="result" id="result" style="display:none;margin-top:20px;"></div>
</div>

<button class="btn musica musica-pos" onclick="reproducirMusica()">Musica</button>

<div class="promotion-modal" id="promotionModal">
  <div class="promotion-card">
    <h2>Promoción de peón</h2>
    <p>Elige la pieza a la que quieres promocionar.</p>
    <div class="promotion-options">
      <button class="promotion-option" type="button" data-piece="q">
        <span class="promotion-symbol">♕</span>
        <span>Dama</span>
      </button>
      <button class="promotion-option" type="button" data-piece="r">
        <span class="promotion-symbol">♖</span>
        <span>Torre</span>
      </button>
      <button class="promotion-option" type="button" data-piece="b">
        <span class="promotion-symbol">♗</span>
        <span>Alfil</span>
      </button>
      <button class="promotion-option" type="button" data-piece="n">
        <span class="promotion-symbol">♘</span>
        <span>Caballo</span>
      </button>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js" defer></script>
<script src="vendor/chessboard.js" defer></script>
<script src="vendor/chess.min.js" defer></script>
<script type="module" src="./js/ajedrez.js"></script>
</body>
</html>
