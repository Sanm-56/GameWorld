<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingreso Ajedrez</title>

<style>
:root{
  --bg-1:#05070b;
  --bg-2:#1f2937;
  --card:rgba(17, 24, 39, 0.86);
  --card-border:rgba(209,213,219,0.22);
  --text:#f9fafb;
  --muted:#d1d5db;
  --accent:#f9fafb;
  --accent-2:#6b7280;
  --input:#0b1120;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:24px;
  font-family:Verdana, Geneva, Tahoma, sans-serif;
  color:var(--text);
  background:
    linear-gradient(45deg, rgba(255,255,255,0.06) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.06) 75%),
    linear-gradient(45deg, rgba(255,255,255,0.06) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.06) 75%),
    radial-gradient(circle at top, rgba(156,163,175,0.18), transparent 30%),
    radial-gradient(circle at bottom right, rgba(75,85,99,0.25), transparent 28%),
    linear-gradient(145deg, var(--bg-1), var(--bg-2));
  background-position:0 0, 20px 20px, 0 0, 0 0, 0 0;
  background-size:40px 40px, 40px 40px, auto, auto, auto;
}

.container{
  width:min(100%, 430px);
  background:var(--card);
  border:1px solid var(--card-border);
  border-radius:28px;
  padding:34px 28px;
  text-align:center;
  box-shadow:0 24px 60px rgba(0,0,0,0.42);
  backdrop-filter:blur(10px);
}

.icono{
  font-size:48px;
  margin-bottom:10px;
}

h2{
  margin:0 0 8px;
  font-size:34px;
}

p{
  margin:0 0 24px;
  color:var(--muted);
  line-height:1.5;
}

input{
  width:100%;
  display:block;
  margin:0 0 14px;
  padding:14px 16px;
  border-radius:14px;
  border:1px solid #93c5fd55;
  background:var(--input);
  color:var(--text);
  font-size:16px;
  outline:none;
}

input::placeholder{
  color:#d1d5db;
}

input:focus{
  border-color:#e5e7eb;
  box-shadow:0 0 0 4px rgba(209,213,219,0.16);
}

button{
  width:100%;
  margin-top:6px;
  padding:14px 20px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg, var(--accent), var(--accent-2));
  color:#111827;
  font-size:17px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 14px 24px rgba(0,0,0,0.28);
  transition:transform 0.2s ease, box-shadow 0.2s ease;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 18px 30px rgba(0,0,0,0.35);
}

.acciones-login{
  display:grid;
  gap:10px;
}

.volver{
  background:rgba(15,23,42,0.72);
  border:1px solid rgba(148,163,184,0.24);
  color:white;
  box-shadow:none;
}

.volver:hover{
  box-shadow:0 14px 24px rgba(15,23,42,0.28);
}

@media (max-width:480px){
  body{
    padding:16px;
    align-items:flex-start;
  }

  .container{
    margin-top:18px;
    padding:28px 20px;
    border-radius:24px;
  }

  h2{
    font-size:30px;
  }
}
</style>
<style>
html, body{
width:100%;
max-width:100%;
overflow-x:hidden;
}

.container{
max-width:100%;
min-width:0;
}

h2, p, button, input{
overflow-wrap:anywhere;
}

@media (max-width:480px){
body{
padding:12px;
}

.container{
width:100%;
padding:24px 16px;
border-radius:18px;
}

button{
padding:13px 12px;
font-size:15px;
}
}
</style>
<link rel="stylesheet" href="../css/responsive-desktop.css">
</head>
<body>

<div class="container">
  <h2>♟️ Ajedrez</h2>
  <p>Ingresa con tu apodo y tu código único para entrar al lobby del torneo.</p>
  <input id="usuario" placeholder="Tu apodo">
  <input id="codigo" placeholder="Código unico">
  <div class="acciones-login">
    <button onclick="entrar()">Entrar</button>
    <button class="volver" onclick="window.location.href='../../index.html'">Volver al menu principal</button>
  </div>
</div>

<script type="module" src="../js/login.js"></script>

</body>
</html>
