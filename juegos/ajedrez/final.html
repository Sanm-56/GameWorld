<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados Ajedrez</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.contenedor{
  width:100%;
  max-width:420px;
  padding:20px;
  text-align:center;
}

h1{
  margin-bottom:10px;
}

#resultadoFinal{
  background:#1e293b;
  border-radius:14px;
  padding:20px;
  margin:20px 0;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(135deg, #22c55e, #16a34a);
  color:white;
}

button:hover{
  transform:scale(1.05);
}
/* MORADO PARA MÚSICA */
.btn.musica{
background:linear-gradient(135deg, #8b5cf6, #7c3aed);
color:white;
width:auto;
}

/* POSICIÓN MÚSICA */
.musica-pos{
position:absolute;
bottom:20px;
left:20px;
}

/* EFECTO */
.btn:hover{
transform:translateY(-2px) scale(1.05);
box-shadow:0 6px 15px rgba(0,0,0,0.4);
}

@media (max-width:500px){
  .contenedor{
    padding:16px 12px;
  }
}
</style>
<style>
html, body{width:100%;max-width:100%;overflow-x:hidden;}
body{padding:14px;box-sizing:border-box;}
.contenedor,#ranking{max-width:100%;min-width:0;box-sizing:border-box;}
#ranking div,h1,h2,p,button{overflow-wrap:anywhere;}
.musica-pos{position:fixed;bottom:14px;left:14px;z-index:1000;}
@media (max-width:500px){
body{align-items:flex-start;padding-bottom:74px;}
button{max-width:100%;font-size:15px;}
.btn.musica{width:auto;max-width:calc(100vw - 28px);}
}
</style>
<link rel="stylesheet" href="../css/finales.css">
</head>

<body>

<div class="contenedor">
<h1>Resultado Ajedrez</h1>
<div id="resultadoFinal">Cargando resultado...</div>
<div id="podio" style="margin-top:20px"></div>
<h2>Ranking</h2>
<div id="ranking"></div>
<button onclick="volverLobby()">Volver al lobby</button>
</div>
<!-- BOTÓN DE MÚSICA EN INFERIOR IZQUIERDA -->
<button class="btn musica musica-pos" onclick="reproducirMusica()">Musica</button>

<audio loop>
  <source src="./music/ajedrezmusic.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<script type="module" src="./js/final.js"></script>
<script>
/* FUNCIÓN PARA REPRODUCIR/PAUSAR MÚSICA */
function reproducirMusica(){
  const audio = document.querySelector('audio');
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}
</script>
</body>
</html>
