<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Resultados Ajedrez</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.contenedor{
  width:100%;
  max-width:420px;
  padding:20px;
  text-align:center;
}

h1{
  margin-bottom:10px;
}

#resultadoFinal{
  background:#1e293b;
  border-radius:14px;
  padding:20px;
  margin:20px 0;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(135deg, #22c55e, #16a34a);
  color:white;
}

button:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="contenedor">
<h1>🏁 Resultado Ajedrez</h1>
<div id="resultadoFinal">Cargando resultado...</div>
<div id="podio" style="margin-top:20px"></div>
<h2 style="margin-top:20px">📊 Ranking</h2>
<div id="ranking"></div>
<button onclick="volverLobby()">🏠 Volver al lobby</button>
</div>

<script type="module" src="./js/final.js"></script>
</body>
</html>
