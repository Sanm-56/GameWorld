<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados Ajedrez</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.contenedor{
  width:100%;
  max-width:420px;
  padding:20px;
  text-align:center;
}

h1{
  margin-bottom:10px;
}

#resultadoFinal{
  background:#1e293b;
  border-radius:14px;
  padding:20px;
  margin:20px 0;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(135deg, #22c55e, #16a34a);
  color:white;
}

button:hover{
  transform:scale(1.05);
}
/* MORADO PARA MÚSICA */
.btn.musica{
background:linear-gradient(135deg, #8b5cf6, #7c3aed);
color:white;
width:auto;
}

/* POSICIÓN MÚSICA */
.musica-pos{
position:absolute;
bottom:20px;
left:20px;
}

/* EFECTO */
.btn:hover{
transform:translateY(-2px) scale(1.05);
box-shadow:0 6px 15px rgba(0,0,0,0.4);
}

@media (max-width:500px){
  .contenedor{
    padding:16px 12px;
  }
}
</style>
<style>
html, body{width:100%;max-width:100%;overflow-x:hidden;}
body{padding:14px;box-sizing:border-box;}
.contenedor,#ranking{max-width:100%;min-width:0;box-sizing:border-box;}
#ranking div,h1,h2,p,button{overflow-wrap:anywhere;}
.musica-pos{position:fixed;bottom:14px;left:14px;z-index:1000;}
@media (max-width:500px){
body{align-items:flex-start;padding-bottom:74px;}
button{max-width:100%;font-size:15px;}
.btn.musica{width:auto;max-width:calc(100vw - 28px);}
}
</style>
<style>
body{
  background:
    linear-gradient(45deg, rgba(15,23,42,0.92) 25%, rgba(30,41,59,0.92) 25% 50%, rgba(15,23,42,0.92) 50% 75%, rgba(30,41,59,0.92) 75%),
    #0f172a;
  background-size:80px 80px;
}
.contenedor{
  max-width:620px;
  padding:28px;
  border-radius:16px;
  background:#f8fafc;
  color:#111827;
  border:8px solid #111827;
  box-shadow:0 26px 70px rgba(0,0,0,0.42);
}
h1{
  color:#111827;
}
h2{
  color:#7c2d12;
}
#resultadoFinal,
#ranking{
  background:#e7d8c7;
  color:#111827;
  border:2px solid #78350f;
}
#podio{
  display:grid;
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:12px;
}
#podio div{
  padding:14px;
  border-radius:10px;
  background:#111827;
  color:#f8fafc;
  border:3px solid #d6b48d;
}
button:not(.musica){
  background:linear-gradient(135deg, #78350f, #111827);
}
@media (max-width:640px){
  #podio{grid-template-columns:1fr;}
}
</style>
<style>
.contenedor{
  width:min(760px, 100%);
  margin:0 auto;
}
.contenedor > h1,
.contenedor > h2,
.contenedor > h3,
.contenedor > #resultadoFinal,
.contenedor > #resumenFinal,
.contenedor > .posicion-final{
  width:min(580px, 100%);
  margin-left:auto;
  margin-right:auto;
  text-align:center;
  line-height:1.35;
}
#ranking{
  width:min(580px, 100%);
  margin:16px auto 0;
  max-height:min(380px, 48vh);
}
#ranking .ranking-row{
  display:grid;
  grid-template-columns:52px minmax(0, 1fr) auto;
  gap:12px;
  align-items:center;
  padding:12px 10px;
}
#ranking .ranking-row.actual{
  border-radius:12px;
  background:rgba(120,53,15,0.14);
}
#ranking .ranking-row span:last-child{
  justify-self:end;
  text-align:right;
  white-space:nowrap;
}
#ranking p,
#ranking .vacio{
  margin:0;
  padding:28px 14px;
  text-align:center;
}
.contenedor > button:not(.musica){
  display:block;
  width:min(340px, 100%);
  margin-left:auto;
  margin-right:auto;
}
@media (max-width:560px){
  #ranking .ranking-row{grid-template-columns:42px minmax(0, 1fr);}
  #ranking .ranking-row span:last-child{grid-column:2;justify-self:start;text-align:left;}
}
</style>
<link rel="stylesheet" href="../css/finales.css">
<style>
body{
  background:
    linear-gradient(45deg, rgba(15,23,42,0.92) 25%, rgba(30,41,59,0.92) 25% 50%, rgba(15,23,42,0.92) 50% 75%, rgba(30,41,59,0.92) 75%),
    #0f172a !important;
  background-size:80px 80px !important;
}
.contenedor{
  background:linear-gradient(180deg, #f8fafc, #d6b48d) !important;
  color:#111827 !important;
  border:8px solid #111827 !important;
  box-shadow:0 26px 80px rgba(0,0,0,0.48) !important;
}
h1,
h2,
h3{
  color:#111827 !important;
}
#resultadoFinal{
  color:#78350f !important;
  background:#fff7ed !important;
  border-color:#92400e !important;
}
.contenedor > button:not(.musica){
  background:linear-gradient(135deg, #78350f, #111827) !important;
  color:white !important;
}
</style>
<link rel="stylesheet" href="../css/responsive-desktop.css">
</head>

<body>

<div class="contenedor">
<h1>Resultado Ajedrez</h1>
<div id="resultadoFinal">Cargando resultado...</div>
<div id="podio" style="margin-top:20px"></div>
<h2>Ranking</h2>
<div id="ranking"></div>
<button onclick="volverLobby()">Volver al lobby</button>
</div>
<!-- BOTÓN DE MÚSICA EN INFERIOR IZQUIERDA -->
<button class="btn musica musica-pos" onclick="reproducirMusica()">Musica</button>

<audio loop>
  <source src="./music/ajedrezmusic.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<script type="module" src="./js/final.js"></script>
<script>
/* FUNCIÓN PARA REPRODUCIR/PAUSAR MÚSICA */
function reproducirMusica(){
  const audio = document.querySelector('audio');
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}
</script>
</body>
</html>
