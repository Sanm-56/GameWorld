<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashMind - Final</title>
  <style>
    body{
      font-family: Arial;
      text-align:center;
      background:#0b1220;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      min-height:100dvh;
      margin:0;
      padding:16px;
      overflow-x:hidden;
    }
    .contenedor{
      width:min(920px, 100%);
      background:#111b33;
      border:1px solid rgba(34,211,238,0.2);
      padding:24px;
      border-radius:18px;
      box-shadow:0 20px 60px rgba(0,0,0,0.35);
    }
    #podio{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin:18px 0;
    }
    #podio div{
      background:#0b1220;
      padding:14px 16px;
      border-radius:14px;
      min-width:220px;
      border:1px solid rgba(148,163,184,0.16);
    }
    #ranking{
      margin-top:12px;
      text-align:left;
      max-width:520px;
      margin-left:auto;
      margin-right:auto;
      background:#0b1220;
      border:1px solid rgba(148,163,184,0.16);
      border-radius:14px;
      padding:14px 16px;
    }
    button{
      margin-top:18px;
      padding:12px 20px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-weight:bold;
      background:linear-gradient(135deg, #22d3ee, #2563eb);
      color:white;
    }
/* MORADO PARA MÚSICA */
.btn.musica{
background:linear-gradient(135deg, #8b5cf6, #7c3aed);
color:white;
width:auto;
}

/* POSICIÓN MÚSICA */
.musica-pos{
position:absolute;
bottom:20px;
left:20px;
}

/* EFECTO */
.btn:hover{
transform:translateY(-2px) scale(1.05);
box-shadow:0 6px 15px rgba(0,0,0,0.4);
}
</style>
<style>
html, body{width:100%;max-width:100%;overflow-x:hidden;}
body{padding:14px;box-sizing:border-box;}
.contenedor,#ranking{max-width:100%;min-width:0;box-sizing:border-box;}
#ranking div,h1,h2,p,button{overflow-wrap:anywhere;}
.musica-pos{position:fixed;bottom:14px;left:14px;z-index:1000;}
@media (max-width:500px){
body{align-items:flex-start;padding-bottom:74px;}
button{max-width:100%;font-size:15px;}
.btn.musica{width:auto;max-width:calc(100vw - 28px);}
}
</style>
<style>
    body{
      background:
        radial-gradient(circle at 50% 0%, rgba(34,211,238,0.28), transparent 34%),
        linear-gradient(135deg, #050816, #101a35 55%, #03111f);
    }
    .contenedor{
      border-radius:24px;
      background:rgba(9,14,30,0.86);
      border:1px solid rgba(34,211,238,0.42);
      box-shadow:0 0 48px rgba(34,211,238,0.18), 0 28px 70px rgba(0,0,0,0.42);
    }
    h1{
      color:#67e8f9;
      text-shadow:0 0 18px rgba(34,211,238,0.42);
    }
    #resultadoFinal{
      color:#fef08a;
      font-size:1.25rem;
    }
    #podio div{
      background:linear-gradient(145deg, rgba(14,165,233,0.16), rgba(168,85,247,0.14));
      border-color:rgba(34,211,238,0.32);
      box-shadow:0 0 24px rgba(34,211,238,0.12);
    }
    #ranking{
      background:rgba(2,6,23,0.74);
      border-color:rgba(34,211,238,0.28);
    }
    #ranking div{
      padding:10px;
      border-bottom:1px solid rgba(34,211,238,0.14);
    }
  </style>
  <style>
    .contenedor{
      width:min(920px, 100%);
      margin:0 auto;
    }
    .contenedor > h1,
    .contenedor > h2,
    .contenedor > h3,
    .contenedor > #resultadoFinal,
    .contenedor > #resumenFinal,
    .contenedor > .posicion-final{
      width:min(620px, 100%);
      margin-left:auto;
      margin-right:auto;
      text-align:center;
      line-height:1.35;
    }
    #ranking{
      width:min(620px, 100%);
      margin:16px auto 0;
      max-height:min(380px, 48vh);
    }
    #ranking .ranking-row{
      display:grid;
      grid-template-columns:52px minmax(0, 1fr) auto;
      gap:12px;
      align-items:center;
      padding:12px 10px;
    }
    #ranking .ranking-row.actual{
      border-radius:12px;
      background:rgba(34,211,238,0.15);
    }
    #ranking .ranking-row span:last-child{
      justify-self:end;
      text-align:right;
      white-space:nowrap;
    }
    #ranking p,
    #ranking .vacio{
      margin:0;
      padding:28px 14px;
      text-align:center;
    }
    .contenedor > button:not(.musica){
      display:block;
      width:min(340px, 100%);
      margin-left:auto;
      margin-right:auto;
    }
    @media (max-width:560px){
      #ranking .ranking-row{grid-template-columns:42px minmax(0, 1fr);}
      #ranking .ranking-row span:last-child{grid-column:2;justify-self:start;text-align:left;}
    }
  </style>
<link rel="stylesheet" href="../css/finales.css">
<style>
body{
  background:
    radial-gradient(circle at 50% 0%, rgba(34,211,238,0.28), transparent 34%),
    radial-gradient(circle at 80% 72%, rgba(168,85,247,0.2), transparent 30%),
    linear-gradient(135deg, #050816, #101a35 55%, #03111f) !important;
}
.contenedor{
  background:rgba(9,14,30,0.92) !important;
  border-color:rgba(34,211,238,0.42) !important;
  box-shadow:0 0 46px rgba(34,211,238,0.18), 0 28px 80px rgba(0,0,0,0.46) !important;
}
h1{
  color:#67e8f9 !important;
  text-shadow:0 0 18px rgba(34,211,238,0.42) !important;
}
#resultadoFinal{
  color:#fef08a !important;
  background:linear-gradient(135deg, rgba(34,211,238,0.18), rgba(168,85,247,0.12)) !important;
  border-color:rgba(34,211,238,0.32) !important;
}
.contenedor > button:not(.musica){
  background:linear-gradient(135deg, #22d3ee, #2563eb) !important;
  color:white !important;
}
</style>
</head>
<body>
  <div class="contenedor">
    <h1>FlashMind - Resultados</h1>
    <div id="resultadoFinal"></div>

    <div id="podio"></div>
    <div id="ranking"></div>

    <button onclick="volverLobby()">Volver al lobby</button>
  </div>
  <!-- BOTÓN DE MÚSICA EN INFERIOR IZQUIERDA -->
<button class="btn musica musica-pos" onclick="reproducirMusica()">Musica</button>

<audio loop>
  <source src="./musicc/flashmindmusic.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

  <script type="module" src="./js/final.js"></script>
  <script>
/* FUNCIÓN PARA REPRODUCIR/PAUSAR MÚSICA */
function reproducirMusica(){
  const audio = document.querySelector('audio');
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}
</script>
</body>
</html>
