<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashMind - Final</title>
  <style>
    body{
      font-family: Arial;
      text-align:center;
      background:#0b1220;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      min-height:100dvh;
      margin:0;
      padding:16px;
      overflow-x:hidden;
    }
    .contenedor{
      width:min(920px, 100%);
      background:#111b33;
      border:1px solid rgba(34,211,238,0.2);
      padding:24px;
      border-radius:18px;
      box-shadow:0 20px 60px rgba(0,0,0,0.35);
    }
    #podio{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin:18px 0;
    }
    #podio div{
      background:#0b1220;
      padding:14px 16px;
      border-radius:14px;
      min-width:220px;
      border:1px solid rgba(148,163,184,0.16);
    }
    #ranking{
      margin-top:12px;
      text-align:left;
      max-width:520px;
      margin-left:auto;
      margin-right:auto;
      background:#0b1220;
      border:1px solid rgba(148,163,184,0.16);
      border-radius:14px;
      padding:14px 16px;
    }
    button{
      margin-top:18px;
      padding:12px 20px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-weight:bold;
      background:linear-gradient(135deg, #22d3ee, #2563eb);
      color:white;
    }
/* MORADO PARA MÚSICA */
.btn.musica{
background:linear-gradient(135deg, #8b5cf6, #7c3aed);
color:white;
width:auto;
}

/* POSICIÓN MÚSICA */
.musica-pos{
position:absolute;
bottom:20px;
left:20px;
}

/* EFECTO */
.btn:hover{
transform:translateY(-2px) scale(1.05);
box-shadow:0 6px 15px rgba(0,0,0,0.4);
}
</style>
<style>
html, body{width:100%;max-width:100%;overflow-x:hidden;}
body{padding:14px;box-sizing:border-box;}
.contenedor,#ranking{max-width:100%;min-width:0;box-sizing:border-box;}
#ranking div,h1,h2,p,button{overflow-wrap:anywhere;}
.musica-pos{position:fixed;bottom:14px;left:14px;z-index:1000;}
@media (max-width:500px){
body{align-items:flex-start;padding-bottom:74px;}
button{max-width:100%;font-size:15px;}
.btn.musica{width:auto;max-width:calc(100vw - 28px);}
}
</style>
  <link rel="stylesheet" href="../css/finales.css">
</head>
<body>
  <div class="contenedor">
    <h1>FlashMind - Resultados</h1>
    <div id="resultadoFinal"></div>

    <div id="podio"></div>
    <div id="ranking"></div>

    <button onclick="volverLobby()">Volver al lobby</button>
  </div>
  <!-- BOTÓN DE MÚSICA EN INFERIOR IZQUIERDA -->
<button class="btn musica musica-pos" onclick="reproducirMusica()">Musica</button>

<audio loop>
  <source src="./musicc/flashmindmusic.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

  <script type="module" src="./js/final.js"></script>
  <script>
/* FUNCIÓN PARA REPRODUCIR/PAUSAR MÚSICA */
function reproducirMusica(){
  const audio = document.querySelector('audio');
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}
</script>
</body>
</html>
