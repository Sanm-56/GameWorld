<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo de Juegos</title>
<link rel="stylesheet" href="juegos/css/responsive-desktop.css">
<style>
:root{
  --bg:#020617;
  --bg-2:#08172c;
  --panel:rgba(8, 16, 30, 0.72);
  --panel-border:rgba(148, 163, 184, 0.18);
  --text:#f8fafc;
  --muted:#b7c4d8;
  --soft:#dbeafe;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Inter, Poppins, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    radial-gradient(circle at 16% 6%, rgba(56,189,248,0.18), transparent 28%),
    radial-gradient(circle at 86% 14%, rgba(244,114,182,0.11), transparent 26%),
    linear-gradient(145deg, var(--bg-2) 0%, var(--bg) 58%, #000 100%);
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:24px;
  overflow-x:hidden;
}

h1{
  font-size:clamp(46px, 4.2vw, 72px);
  line-height:1;
  letter-spacing:0;
  margin:0 0 14px;
  text-align:center;
  text-shadow:0 12px 30px rgba(0,0,0,0.34);
}

.dashboard{
  width:min(1200px, 100%);
  display:grid;
  grid-template-columns:190px minmax(0, 1fr);
  gap:20px;
  align-items:stretch;
}

.sidebar,
.panel-principal{
  border:1px solid var(--panel-border);
  background:var(--panel);
  box-shadow:0 30px 80px rgba(0,0,0,0.36);
  backdrop-filter:blur(14px);
}

.sidebar{
  min-height:650px;
  border-radius:22px;
  padding:18px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.sidebar-brand{
  display:flex;
  flex-direction:column;
  gap:6px;
  color:var(--soft);
  font-weight:800;
}

.sidebar-brand span{
  color:var(--muted);
  font-size:13px;
  font-weight:500;
}

.panel-principal{
  border-radius:28px;
  padding:34px 30px 30px;
}

.hero{
  width:100%;
}

.etiqueta{
  display:flex;
  align-items:center;
  justify-content:center;
  width:max-content;
  margin:0 auto 18px;
  padding:8px 16px;
  border-radius:999px;
  background:rgba(15,23,42,0.55);
  border:1px solid rgba(148,163,184,0.16);
  color:#bfdbfe;
  font-size:14px;
  font-weight:800;
}

.subtitulo{
  color:var(--muted);
  margin:0 auto;
  text-align:center;
  max-width:620px;
  line-height:1.6;
  font-size:clamp(15px, 1.25vw, 18px);
}

.menu{
  display:grid;
  grid-template-columns:repeat(4, minmax(0, 1fr));
  gap:20px;
  width:100%;
  margin-top:32px;
}

.boton{
  position:relative;
  min-height:154px;
  padding:22px 20px;
  font:inherit;
  font-size:20px;
  border:none;
  border-radius:18px;
  cursor:pointer;
  transition:transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease, border-color 0.22s ease, background 0.22s ease;
  color:white;
  box-shadow:0 18px 38px rgba(0,0,0,0.25);
  text-align:left;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.12);
}

.boton:hover{
  transform:translateY(-5px) scale(1.02);
  filter:saturate(1.1) brightness(1.06);
  box-shadow:0 24px 48px rgba(14,165,233,0.18), 0 18px 38px rgba(0,0,0,0.28);
}

.boton::before{
  content:"";
  position:absolute;
  inset:auto -28% -38% auto;
  width:120px;
  height:120px;
  border-radius:50%;
  background:rgba(255,255,255,0.12);
}

.acciones .boton::before,
.admin-btn::before{
  display:none;
}

.boton .emoji{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:46px;
  height:46px;
  border-radius:15px;
  margin-bottom:16px;
  background:rgba(255,255,255,0.14);
  font-size:26px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.18);
}

.boton .titulo{
  display:block;
  font-weight:800;
  margin-bottom:8px;
}

.boton .detalle{
  display:block;
  font-size:14px;
  line-height:1.45;
  color:rgba(255,255,255,0.84);
}

.sudoku{
  background:linear-gradient(135deg, #2563eb, #0f766e);
}

.matematicas{
  background:linear-gradient(135deg, #0f766e, #22c55e);
}

.memoria{
  background:linear-gradient(135deg, #7c3aed, #db2777);
}

.ajedrez{
  background:linear-gradient(135deg, #111827, #374151);
}

.domino{
  background:linear-gradient(135deg, #ea580c, #f59e0b);
}

.damas{
  background:linear-gradient(135deg, #b91c1c, #ef4444);
}

.flashmind{
  background:linear-gradient(135deg, #06b6d4, #2563eb);
}

.numcatch{
  background:linear-gradient(135deg, #16a34a, #22c55e);
}

.acciones{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.profile-btn,
.music-btn,
.rankings-btn,
.admin-btn{
  min-height:auto;
  padding:14px 16px;
  border-radius:16px;
  background:rgba(15,23,42,0.72);
  border:1px solid rgba(148,163,184,0.16);
  opacity:0.95;
  font-size:15px;
  text-align:left;
  box-shadow:0 10px 28px rgba(0,0,0,0.18);
}

.profile-btn:hover,
.music-btn:hover,
.rankings-btn:hover,
.admin-btn:hover{
  background:rgba(30,41,59,0.86);
  transform:translateY(-2px);
}

.profile-btn{
  border-color:rgba(96,165,250,0.34);
}

.rankings-btn{
  border-color:rgba(250,204,21,0.34);
}

.music-btn{
  border-color:rgba(45,212,191,0.34);
}

.admin-btn{
  opacity:0.55;
  font-size:14px;
  text-align:center;
}

.mobile-admin-btn{
  display:none;
}

.ranking-modal{
  position:fixed;
  inset:0;
  z-index:40;
  display:none;
  align-items:center;
  justify-content:center;
  padding:22px;
  background:rgba(2,6,23,0.72);
  backdrop-filter:blur(8px);
  opacity:0;
  transition:opacity 0.22s ease;
}

.ranking-modal.abierto{
  display:flex;
  opacity:1;
}

.ranking-panel{
  width:min(720px, 100%);
  max-height:min(720px, calc(100vh - 44px));
  overflow:hidden;
  border:1px solid rgba(148,163,184,0.18);
  border-radius:24px;
  background:rgba(8,15,29,0.96);
  box-shadow:0 28px 80px rgba(0,0,0,0.45);
  transform:translateY(12px) scale(0.98);
  transition:transform 0.22s ease;
}

.ranking-modal.abierto .ranking-panel{
  transform:translateY(0) scale(1);
}

.ranking-head{
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:flex-start;
  padding:22px 22px 14px;
  border-bottom:1px solid rgba(148,163,184,0.12);
}

.ranking-head h2{
  margin:0 0 6px;
  font-size:24px;
}

.ranking-head p{
  margin:0;
  color:var(--muted);
  line-height:1.4;
  font-size:14px;
}

.ranking-close{
  border:none;
  width:38px;
  height:38px;
  border-radius:12px;
  cursor:pointer;
  background:rgba(148,163,184,0.12);
  color:white;
  font-size:24px;
  line-height:1;
}

.ranking-body{
  padding:18px 22px 22px;
  overflow:auto;
  max-height:calc(min(720px, 100vh - 44px) - 88px);
}

.ranking-controls{
  display:grid;
  grid-template-columns:minmax(140px, 1fr) 2fr;
  gap:12px;
  margin-bottom:16px;
}

.ranking-select{
  width:100%;
  border:1px solid rgba(148,163,184,0.18);
  border-radius:14px;
  padding:12px 14px;
  color:white;
  background:#0f172a;
  font:inherit;
}

.ranking-tabs{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:8px;
}

.ranking-tab{
  border:1px solid rgba(148,163,184,0.16);
  border-radius:14px;
  padding:11px 10px;
  color:white;
  background:rgba(15,23,42,0.72);
  cursor:pointer;
  font:inherit;
  transition:background 0.18s ease, border-color 0.18s ease;
}

.ranking-tab.activo{
  background:rgba(250,204,21,0.18);
  border-color:rgba(250,204,21,0.5);
}

.ranking-status{
  min-height:22px;
  color:var(--muted);
  font-size:14px;
  margin-bottom:10px;
}

.ranking-list{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.ranking-row{
  display:grid;
  grid-template-columns:46px 1fr auto;
  align-items:center;
  gap:10px;
  padding:12px 14px;
  border:1px solid rgba(148,163,184,0.12);
  border-radius:14px;
  background:rgba(15,23,42,0.62);
}

.ranking-pos{
  font-weight:bold;
  color:#fde68a;
}

.ranking-user{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.ranking-score{
  color:#bfdbfe;
  font-weight:bold;
}

@media (max-width: 980px){
  body{
    justify-content:flex-start;
    padding:22px 18px calc(112px + env(safe-area-inset-bottom));
  }

  .dashboard{
    grid-template-columns:1fr;
  }

  .sidebar{
    order:2;
    min-height:0;
    padding:10px;
    position:fixed;
    z-index:30;
    left:max(14px, env(safe-area-inset-left));
    right:max(14px, env(safe-area-inset-right));
    bottom:max(12px, env(safe-area-inset-bottom));
    display:block;
    border-radius:22px;
    background:rgba(7,17,31,0.9);
  }

  .sidebar-brand,
  .admin-btn{
    display:none;
  }

  .acciones{
    display:grid;
    grid-template-columns:repeat(4, minmax(0, 1fr));
    gap:8px;
  }

  .panel-principal{
    padding:28px 22px 24px;
    border-radius:24px;
  }

  .menu{
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:16px;
  }

  .profile-btn,
  .music-btn,
  .rankings-btn,
  .mobile-admin-btn{
    width:100%;
    min-height:46px;
    padding:10px 8px;
    font-size:13px;
    border-radius:14px;
    text-align:center;
    white-space:nowrap;
    box-shadow:none;
  }

  .mobile-admin-btn{
    display:block;
    opacity:0.72;
    border-color:rgba(248,113,113,0.34);
  }
}

@media (max-width: 720px){
  h1{
    font-size:clamp(34px, 10vw, 46px);
    line-height:1.05;
  }

  .panel-principal{
    padding:22px 16px 18px;
    border-radius:22px;
  }

  .subtitulo{
    font-size:15px;
  }

  .etiqueta{
    font-size:13px;
    margin-bottom:14px;
  }

  .menu{
    grid-template-columns:1fr;
    gap:14px;
    max-width:min(400px, 100%);
    margin-left:auto;
    margin-right:auto;
    margin-top:22px;
  }

  .boton{
    min-height:0;
    padding:16px;
    font-size:18px;
    border-radius:18px;
    box-shadow:0 12px 22px rgba(0,0,0,0.22);
  }

  .boton .emoji{
    width:40px;
    height:40px;
    font-size:24px;
    margin-bottom:10px;
  }

  .boton .titulo{
    margin-bottom:4px;
  }

  .boton .detalle{
    font-size:13px;
    line-height:1.35;
  }

  .profile-btn,
  .music-btn,
  .rankings-btn,
  .mobile-admin-btn{
    min-height:46px;
    padding:10px 8px;
    font-size:13px;
    border-radius:14px;
    text-align:center;
  }

  .ranking-controls{
    grid-template-columns:1fr;
  }

  .ranking-tabs{
    grid-template-columns:1fr;
  }

  .ranking-head,
  .ranking-body{
    padding-left:16px;
    padding-right:16px;
  }

  .ranking-row{
    grid-template-columns:38px 1fr;
  }

  .ranking-score{
    grid-column:2;
  }
}

@media (max-width: 420px){
  body{
    padding:14px 10px calc(108px + env(safe-area-inset-bottom));
  }

  .panel-principal{
    padding:18px 12px 16px;
    border-radius:20px;
  }

  h1{
    font-size:clamp(29px, 10vw, 40px);
  }

  .menu{
    gap:11px;
    max-width:100%;
  }

  .boton{
    padding:12px 14px;
    font-size:16px;
    border-radius:16px;
  }

  .boton .emoji{
    font-size:22px;
    margin-bottom:8px;
  }

  .boton .detalle{
    font-size:12px;
    line-height:1.3;
  }

  .acciones{
    gap:6px;
  }

  .profile-btn,
  .music-btn,
  .rankings-btn,
  .mobile-admin-btn{
    min-height:44px;
    padding:9px 6px;
    font-size:12px;
  }
}
</style>
</head>
<body>

<div class="dashboard">
  <aside class="sidebar" aria-label="Navegación principal">
    <div class="sidebar-brand">
      GameWorld
      <span>Panel del torneo</span>
    </div>
    <div class="acciones">
      <button class="boton profile-btn" onclick="irPerfil()">Perfil</button>
      <button class="boton rankings-btn" data-open-rankings>Rankings</button>
      <button class="boton music-btn" onclick="reproducirMusica()">Música</button>
      <button class="boton mobile-admin-btn" onclick="irAdmin()">Admin</button>
    </div>
    <button class="boton admin-btn" onclick="irAdmin()">Admin</button>
  </aside>

  <main class="panel-principal">
    <section class="hero">
      <div class="etiqueta">GameWorld</div>
      <h1>Torneo de Juegos</h1>
      <p class="subtitulo">Elige tu siguiente reto, entra al lobby y compite por los mejores puestos del torneo.</p>
    </section>

    <section class="menu" aria-label="Juegos disponibles">
      <button class="boton sudoku" onclick="irSudoku()">
        <span class="emoji">🧩</span>
        <span class="titulo">Sudoku</span>
        <span class="detalle">Resuelve rápido y sube posiciones en el ranking.</span>
      </button>
      <button class="boton matematicas" onclick="irMatematicas()">
        <span class="emoji">🧠</span>
        <span class="titulo">Matemáticas</span>
        <span class="detalle">Pon a prueba tu velocidad mental y precisión.</span>
      </button>
      <button class="boton memoria" onclick="irMemoria()">
        <span class="emoji">🃏</span>
        <span class="titulo">Memoria</span>
        <span class="detalle">Encuentra parejas y completa el tablero en el menor tiempo posible.</span>
      </button>
      <button class="boton ajedrez" onclick="irAjedrez()">
        <span class="emoji">♟️</span>
        <span class="titulo">Ajedrez</span>
        <span class="detalle">Derrota al rival y clasifica solo si realmente ganas.</span>
      </button>
      <button class="boton domino" onclick="irDomino()">
        <span class="emoji">🎲</span>
        <span class="titulo">Dominó</span>
        <span class="detalle">Entra al juego y compite contra otros jugadores.</span>
      </button>
      <button class="boton damas" onclick="irDamas()">
        <span class="emoji">🔴</span>
        <span class="titulo">Damas</span>
        <span class="detalle">Domina el tablero y gana puntos en cada partida.</span>
      </button>
      <button class="boton flashmind" onclick="irFlashMind()">
        <span class="emoji">⚡</span>
        <span class="titulo">FlashMind</span>
        <span class="detalle">Reacciona al color o símbolo correcto. Cada vez más rápido .</span>
      </button>
      <button class="boton numcatch" onclick="irNumCatch()">
        <span class="emoji">🔢</span>
        <span class="titulo">NumCatch</span>
        <span class="detalle">Atrapa solo los números que cumplan la condición del juego.</span>
      </button>
    </section>
  </main>
</div>

<div class="ranking-modal" id="rankingModal" aria-hidden="true">
  <section class="ranking-panel" role="dialog" aria-modal="true" aria-labelledby="rankingTitle">
    <div class="ranking-head">
      <div>
        <h2 id="rankingTitle">Rankings</h2>
        <p>Consulta clasificaciones semanales, victorias y acumulado global.</p>
        <p>Podras estar entre los tops de los juegos?.</p>
      </div>
      <button class="ranking-close" type="button" data-close-rankings aria-label="Cerrar ranking">&times;</button>
    </div>
    <div class="ranking-body">
      <div class="ranking-controls">
        <select class="ranking-select" id="rankingGame" aria-label="Juego"></select>
        <div class="ranking-tabs" role="tablist" aria-label="Tipos de ranking">
          <button class="ranking-tab activo" type="button" data-ranking-type="semanal">Semanal</button>
          <button class="ranking-tab" type="button" data-ranking-type="victorias">Victorias</button>
          <button class="ranking-tab" type="button" data-ranking-type="global">Global</button>
        </div>
      </div>
      <div class="ranking-status" id="rankingStatus">Listo.</div>
      <div class="ranking-list" id="rankingList"></div>
    </div>
  </section>
</div>

<audio loop>
  <source src="music/musicainicio.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<script>
function irSudoku(){
  window.location.href = 'juegos/sudoku/index.html'
}

function irMatematicas(){
  window.location.href = 'juegos/matematicas/index.html'
}

function irMemoria(){
  window.location.href = 'juegos/memoria/index.html'
}

function irAjedrez(){
  window.location.href = 'juegos/ajedrez/index.html'
}

function irDomino(){
  window.location.href = 'juegos/domino/index.html'
}

function irDamas(){
  window.location.href = 'juegos/damas/index.html'
}

function irFlashMind(){
  window.location.href = 'juegos/flashmind/index.html'
}

function irNumCatch(){
  window.location.href = 'juegos/numcatch/index.html'
}

function irPerfil(){
  window.location.href = 'perfil.html'
}

function irAdmin(){
  window.location.href = 'admin.html'
}

document.addEventListener('keydown', function(e){
  if(e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'n'){
    window.location.href = 'admin.html'
  }
})

function reproducirMusica(){
  const audio = document.querySelector('audio')
  if (audio.paused) {
    audio.play()
  } else {
    audio.pause()
  }
}
</script>
<script type="module" src="juegos/js/rankings-modal.js"></script>
</body>
</html>
