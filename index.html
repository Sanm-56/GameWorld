<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo de Juegos</title>
<style>
:root{
  --bg:#07111f;
  --bg-2:#10233f;
  --panel:rgba(10, 20, 36, 0.78);
  --panel-border:rgba(148, 163, 184, 0.14);
  --text:#f8fafc;
  --muted:#cbd5e1;
  --card-1:#1d4ed8;
  --card-2:#0f766e;
  --card-3:#ca8a04;
  --card-4:#dc2626;
  --card-5:#7c3aed;
  --card-6:#ea580c;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Verdana, Geneva, Tahoma, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 24%),
    radial-gradient(circle at top right, rgba(249,115,22,0.16), transparent 24%),
    radial-gradient(circle at bottom, rgba(34,197,94,0.12), transparent 26%),
    linear-gradient(140deg, var(--bg), var(--bg-2));
  color:var(--text);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:32px 24px 120px;
  overflow-x:hidden;
}

h1{
  font-size:clamp(42px, 7vw, 68px);
  letter-spacing:1px;
  margin:0 0 12px;
  text-align:center;
  text-shadow:0 12px 30px rgba(0,0,0,0.34);
}

.subtitulo{
  color:var(--muted);
  margin:0 0 18px;
  text-align:center;
  max-width:680px;
  line-height:1.6;
}

.hero{
  width:min(1100px, 100%);
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:36px;
  padding:34px 26px 32px;
  box-shadow:0 30px 70px rgba(0,0,0,0.34);
  backdrop-filter:blur(10px);
}

.etiqueta{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 14px;
  border-radius:999px;
  margin-bottom:18px;
  background:rgba(15,23,42,0.55);
  border:1px solid rgba(148,163,184,0.16);
  color:#bfdbfe;
  font-size:14px;
  font-weight:bold;
}

.menu{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(210px, 1fr));
  gap:18px;
  width:100%;
  margin-top:28px;
}

.boton{
  position:relative;
  min-height:128px;
  padding:24px 20px;
  font-size:22px;
  border:none;
  border-radius:24px;
  cursor:pointer;
  transition:transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
  color:white;
  box-shadow:0 18px 30px rgba(0,0,0,0.24);
  text-align:left;
  overflow:hidden;
}

.boton:hover{
  transform:translateY(-6px);
  filter:saturate(1.05);
}

.boton::before{
  content:"";
  position:absolute;
  inset:auto -25% -35% auto;
  width:120px;
  height:120px;
  border-radius:50%;
  background:rgba(255,255,255,0.12);
}

.boton .emoji{
  display:block;
  font-size:34px;
  margin-bottom:10px;
}

.boton .titulo{
  display:block;
  font-weight:bold;
  margin-bottom:6px;
}

.boton .detalle{
  display:block;
  font-size:14px;
  line-height:1.4;
  color:rgba(255,255,255,0.86);
}

.sudoku{
  background:linear-gradient(135deg, #2563eb, #0f766e);
}

.matematicas{
  background:linear-gradient(135deg, #0f766e, #22c55e);
}

.memoria{
  background:linear-gradient(135deg, #7c3aed, #db2777);
}

.ajedrez{
  background:linear-gradient(135deg, #111827, #374151);
}

.domino{
  background:linear-gradient(135deg, #ea580c, #f59e0b);
}

.damas{
  background:linear-gradient(135deg, #b91c1c, #ef4444);
}

.flashmind{
  background:linear-gradient(135deg, #06b6d4, #2563eb);
}

.numcatch{
  background:linear-gradient(135deg, #16a34a, #22c55e);
}

.admin-btn{
  position:absolute;
  bottom:20px;
  right:20px;
  min-height:auto;
  padding:12px 18px;
  border-radius:14px;
  background:rgba(15,23,42,0.55);
  backdrop-filter:blur(8px);
  opacity:0.35;
}

.admin-btn:hover{
  opacity:1;
}

.music-btn{
  position:absolute;
  bottom:20px;
  left:20px;
  min-height:auto;
  padding:14px 18px;
  border-radius:16px;
  background:linear-gradient(135deg, #0f766e, #14b8a6);
  opacity:0.85;
}

.profile-btn{
  position:absolute;
  bottom:98px;
  left:20px;
  min-height:auto;
  padding:14px 18px;
  border-radius:16px;
  background:linear-gradient(135deg, #2563eb, #60a5fa);
  opacity:0.95;
}

.music-btn:hover{
  opacity:1;
}

.rankings-btn{
  position:static;
  min-height:auto;
  padding:14px 18px;
  border-radius:16px;
  background:linear-gradient(135deg, #ca8a04, #facc15);
  opacity:0.95;
}

.rankings-btn:hover{
  opacity:1;
}

.acciones{
  position:absolute;
  left:20px;
  bottom:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.profile-btn,
.music-btn,
.rankings-btn{
  position:static;
}

.ranking-modal{
  position:fixed;
  inset:0;
  z-index:20;
  display:none;
  align-items:center;
  justify-content:center;
  padding:22px;
  background:rgba(2,6,23,0.72);
  backdrop-filter:blur(8px);
  opacity:0;
  transition:opacity 0.22s ease;
}

.ranking-modal.abierto{
  display:flex;
  opacity:1;
}

.ranking-panel{
  width:min(720px, 100%);
  max-height:min(720px, calc(100vh - 44px));
  overflow:hidden;
  border:1px solid rgba(148,163,184,0.18);
  border-radius:24px;
  background:rgba(8,15,29,0.96);
  box-shadow:0 28px 80px rgba(0,0,0,0.45);
  transform:translateY(12px) scale(0.98);
  transition:transform 0.22s ease;
}

.ranking-modal.abierto .ranking-panel{
  transform:translateY(0) scale(1);
}

.ranking-head{
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:flex-start;
  padding:22px 22px 14px;
  border-bottom:1px solid rgba(148,163,184,0.12);
}

.ranking-head h2{
  margin:0 0 6px;
  font-size:24px;
}

.ranking-head p{
  margin:0;
  color:var(--muted);
  line-height:1.4;
  font-size:14px;
}

.ranking-close{
  border:none;
  width:38px;
  height:38px;
  border-radius:12px;
  cursor:pointer;
  background:rgba(148,163,184,0.12);
  color:white;
  font-size:24px;
  line-height:1;
}

.ranking-body{
  padding:18px 22px 22px;
  overflow:auto;
  max-height:calc(min(720px, 100vh - 44px) - 88px);
}

.ranking-controls{
  display:grid;
  grid-template-columns:minmax(140px, 1fr) 2fr;
  gap:12px;
  margin-bottom:16px;
}

.ranking-select{
  width:100%;
  border:1px solid rgba(148,163,184,0.18);
  border-radius:14px;
  padding:12px 14px;
  color:white;
  background:#0f172a;
  font:inherit;
}

.ranking-tabs{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:8px;
}

.ranking-tab{
  border:1px solid rgba(148,163,184,0.16);
  border-radius:14px;
  padding:11px 10px;
  color:white;
  background:rgba(15,23,42,0.72);
  cursor:pointer;
  font:inherit;
  transition:background 0.18s ease, border-color 0.18s ease;
}

.ranking-tab.activo{
  background:rgba(250,204,21,0.18);
  border-color:rgba(250,204,21,0.5);
}

.ranking-status{
  min-height:22px;
  color:var(--muted);
  font-size:14px;
  margin-bottom:10px;
}

.ranking-list{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.ranking-row{
  display:grid;
  grid-template-columns:46px 1fr auto;
  align-items:center;
  gap:10px;
  padding:12px 14px;
  border:1px solid rgba(148,163,184,0.12);
  border-radius:14px;
  background:rgba(15,23,42,0.62);
}

.ranking-pos{
  font-weight:bold;
  color:#fde68a;
}

.ranking-user{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.ranking-score{
  color:#bfdbfe;
  font-weight:bold;
}

@media (max-width: 720px){
  body{
    padding:18px 14px 150px;
  }

  .subtitulo{
    font-size:15px;
    margin-bottom:14px;
  }

  .hero{
    padding:22px 16px 20px;
    border-radius:26px;
  }

  .etiqueta{
    font-size:13px;
    margin-bottom:14px;
  }

  .menu{
    grid-template-columns:1fr;
    gap:14px;
    max-width:min(400px, 100%);
    margin-left:auto;
    margin-right:auto;
    margin-top:22px;
  }

  .boton{
    min-height:0;
    padding:16px 16px;
    font-size:18px;
    border-radius:18px;
    box-shadow:0 12px 22px rgba(0,0,0,0.22);
  }

  .boton .emoji{
    font-size:28px;
    margin-bottom:6px;
  }

  .boton .titulo{
    margin-bottom:4px;
  }

  .boton .detalle{
    font-size:13px;
    line-height:1.35;
  }

  .acciones{
    left:14px;
    bottom:14px;
    gap:10px;
  }

  .profile-btn,
  .music-btn,
  .rankings-btn{
    padding:11px 14px;
    font-size:14px;
    border-radius:14px;
  }

  .ranking-controls{
    grid-template-columns:1fr;
  }

  .ranking-tabs{
    grid-template-columns:1fr;
  }

  .ranking-head,
  .ranking-body{
    padding-left:16px;
    padding-right:16px;
  }

  .ranking-row{
    grid-template-columns:38px 1fr;
  }

  .ranking-score{
    grid-column:2;
  }

  .admin-btn{
    right:14px;
    bottom:14px;
    padding:10px 14px;
    font-size:14px;
  }
}

@media (max-width: 420px){
  body{
    padding:14px 12px 148px;
  }

  .hero{
    padding:18px 12px 16px;
    border-radius:22px;
  }

  h1{
    font-size:clamp(30px, 9vw, 42px);
  }

  .menu{
    gap:11px;
    max-width:100%;
  }

  .boton{
    padding:12px 14px;
    font-size:16px;
    border-radius:16px;
  }

  .boton .emoji{
    font-size:24px;
    margin-bottom:4px;
  }

  .boton .detalle{
    font-size:12px;
    line-height:1.3;
    display:-webkit-box;
    -webkit-line-clamp:2;
    line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
}
</style>
</head>
<body>

<section class="hero">
  <div class="etiqueta">GameWorld</div>
  <h1>Torneo de Juegos</h1>
  <p class="subtitulo">Elige tu siguiente reto y entra al lobby del juego que quieras disputar. Juega, disfruta y domina las clasificaciones de cada torneo.</p>

  <div class="menu">
    <button class="boton sudoku" onclick="irSudoku()">
      <span class="emoji">🧩</span>
      <span class="titulo">Sudoku</span>
      <span class="detalle">Resuelve rápido y sube posiciones en el ranking.</span>
    </button>
    <button class="boton matematicas" onclick="irMatematicas()">
      <span class="emoji">🧠</span>
      <span class="titulo">Matematicas</span>
      <span class="detalle">Pon a prueba tu velocidad mental y precisión.</span>
    </button>
    <button class="boton memoria" onclick="irMemoria()">
      <span class="emoji">🃏</span>
      <span class="titulo">Memoria</span>
      <span class="detalle">Encuentra parejas y completa el tablero en el menor tiempo.</span>
    </button>
    <button class="boton ajedrez" onclick="irAjedrez()">
      <span class="emoji">♟️</span>
      <span class="titulo">Ajedrez</span>
      <span class="detalle">Derrota al rival y clasifica solo si realmente ganas.</span>
    </button>
    <button class="boton domino" onclick="irDomino()">
      <span class="emoji">🎲</span>
      <span class="titulo">Dominó</span>
      <span class="detalle">Entra al juego y compite contra otros jugadores.</span>
    </button>
    <button class="boton damas" onclick="irDamas()">
      <span class="emoji">🔴</span>
      <span class="titulo">Damas</span>
      <span class="detalle">Domina el tablero y gana puntos en cada partida.</span>
    </button>
    <button class="boton flashmind" onclick="irFlashMind()">
      <span class="emoji">⚡</span>
      <span class="titulo">FlashMind</span>
      <span class="detalle">Reacciona al color o símbolo correcto. Cada vez más rápido.</span>
    </button>
    <button class="boton numcatch" onclick="irNumCatch()">
      <span class="emoji">🔢</span>
      <span class="titulo">NumCatch</span>
      <span class="detalle">Atrapa solo los números que cumplan la condición.</span>
    </button>
  </div>
</section>

<button class="boton admin-btn" onclick="irAdmin()">Admin</button>
<div class="acciones">
  <button class="boton profile-btn" onclick="irPerfil()">Perfil</button>
  <button class="boton rankings-btn" data-open-rankings>Rankings</button>
  <button class="boton music-btn" onclick="reproducirMusica()">Musica</button>
</div>

<div class="ranking-modal" id="rankingModal" aria-hidden="true">
  <section class="ranking-panel" role="dialog" aria-modal="true" aria-labelledby="rankingTitle">
    <div class="ranking-head">
      <div>
        <h2 id="rankingTitle">Rankings</h2>
        <p>Consulta clasificaciones semanales, victorias y acumulado global.</p>
      </div>
      <button class="ranking-close" type="button" data-close-rankings aria-label="Cerrar ranking">&times;</button>
    </div>
    <div class="ranking-body">
      <div class="ranking-controls">
        <select class="ranking-select" id="rankingGame" aria-label="Juego"></select>
        <div class="ranking-tabs" role="tablist" aria-label="Tipos de ranking">
          <button class="ranking-tab activo" type="button" data-ranking-type="semanal">Semanal</button>
          <button class="ranking-tab" type="button" data-ranking-type="victorias">Victorias</button>
          <button class="ranking-tab" type="button" data-ranking-type="global">Global</button>
        </div>
      </div>
      <div class="ranking-status" id="rankingStatus">Listo.</div>
      <div class="ranking-list" id="rankingList"></div>
    </div>
  </section>
</div>

<audio loop>
  <source src="music/musicainicio.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<script>
function irSudoku(){
  window.location.href = 'juegos/sudoku/index.html'
}

function irMatematicas(){
  window.location.href = 'juegos/matematicas/index.html'
}

function irMemoria(){
  window.location.href = 'juegos/memoria/index.html'
}

function irAjedrez(){
  window.location.href = 'juegos/ajedrez/index.html'
}

function irDomino(){
  window.location.href = 'juegos/domino/index.html'
}

function irDamas(){
  window.location.href = 'juegos/damas/index.html'
}

function irFlashMind(){
  window.location.href = 'juegos/flashmind/index.html'
}

function irNumCatch(){
  window.location.href = 'juegos/numcatch/index.html'
}

function irPerfil(){
  window.location.href = 'perfil.html'
}

function irAdmin(){
  window.location.href = 'admin.html'
}

document.addEventListener('keydown', function(e){
  if(e.ctrlKey && e.shiftKey && e.key.toLowerCase() === 'n'){
    window.location.href = 'admin.html'
  }
})

function reproducirMusica(){
  const audio = document.querySelector('audio')
  if (audio.paused) {
    audio.play()
  } else {
    audio.pause()
  }
}
</script>
<script type="module" src="juegos/js/rankings-modal.js"></script>
</body>
</html>
